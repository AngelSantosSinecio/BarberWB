services:
  db-server:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_NAME:-barberapp_db}
      MARIADB_USER: ${DB_USER:-barberapp_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-BarberApp123!}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db-server:
        condition: service_healthy
    environment:
      PORT: 3000
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      DB_HOST: db-server
      DB_PORT: 3306
      DB_USER: ${DB_USER:-barberapp_user}
      DB_PASSWORD: ${DB_PASSWORD:-BarberApp123!}
      DB_NAME: ${DB_NAME:-barberapp_db}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-BarberApp <no-reply@barberapp.local>}
    expose:
      - "3000"

  frontend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
